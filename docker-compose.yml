services:
  harborwalk:
    build: .
    image: harborwalk-reporting:latest
    container_name: harborwalk-reporting
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATA_DIR=/data
    volumes:
      - harborwalk-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  harborwalk-data:
