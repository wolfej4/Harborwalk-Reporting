services:
  harborwalk:
    build: .
    image: harborwalk-reporting:latest
    container_name: harborwalk-reporting
    restart: unless-stopped
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
